name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: index.html内のJSを抽出して構文チェック
        run: |
          python3 <<'EOF'
          import re, sys
          with open('index.html', encoding='utf-8') as f:
              content = f.read()
          scripts = re.findall(r'<script(?:(?!src=)[^>])*>(.*?)</script>', content, re.DOTALL)
          if not scripts:
              print("警告: <script>ブロックが見つかりませんでした")
              sys.exit(1)
          with open('/tmp/combined.js', 'w', encoding='utf-8') as f:
              for s in scripts:
                  f.write(s)
                  f.write('\n;\n')
          print(f"{len(scripts)}個のscriptブロックを抽出しました")
          EOF
          node --check /tmp/combined.js && echo "✅ 構文エラーなし"

      - name: HTMLの基本的なタグバランス確認
        run: |
          python3 <<'EOF'
          import re
          with open('index.html', encoding='utf-8') as f:
              content = f.read()
          for tag in ['div', 'script', 'button', 'span']:
              opens = len(re.findall(rf'<{tag}\b', content))
              closes = len(re.findall(rf'</{tag}>', content))
              if abs(opens - closes) > 3:
                  print(f"⚠️ <{tag}> の開閉が大きくズレています: open={opens} close={closes}")
          print("タグバランスチェック完了")
          EOF
